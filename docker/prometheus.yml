# =============================================================================
# Prometheus Configuration — FCIT SRS v3
# FIXED: removed direct postgres:5432 HTTP scrape (caused "invalid startup packet")
# ADDED: postgres_exporter job (proper metrics via port 9187)
# UPDATED: Prometheus v3 compatible config
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    cluster: 'fcit-srs'
    env:     'production'

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:

  # ── FCIT SRS Backend (Node.js / prom-client) ────────────────────────────────
  - job_name: 'fcit-srs-backend'
    static_configs:
      - targets: ['backend:3000']
        labels:
          service: 'backend'
          app:     'fcit-srs'
    metrics_path:   '/metrics'
    scrape_interval: 15s
    scrape_timeout:  10s
    honor_labels: true

  # ── PostgreSQL (via postgres_exporter on port 9187) ─────────────────────────
  # FIX: was previously scraping postgres:5432 directly with HTTP —
  #      that caused "invalid length of startup packet" in postgres logs.
  #      postgres_exporter speaks the postgres wire protocol internally
  #      and exposes clean HTTP /metrics on port 9187.
  - job_name: 'fcit-srs-postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
          app:     'fcit-srs'
    metrics_path:    '/metrics'
    scrape_interval: 30s
    scrape_timeout:  20s

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path:    '/metrics'
    scrape_interval: 60s
